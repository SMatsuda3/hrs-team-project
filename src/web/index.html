<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waseda Hotel Reservation System</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-portal="customer">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">HRS</span>
        <div>
          <strong>Waseda Hotel</strong>
          <small>Reservation System</small>
        </div>
      </div>
      <nav class="guest-nav" aria-label="顧客メニュー">
        <button class="nav-link" data-view="home">空室検索</button>
        <button class="nav-link" data-view="lookup">予約確認</button>
      </nav>
      <div class="topbar-actions">
        <span id="rolePill" class="role-pill hidden"></span>
        <button id="loginButton" class="button secondary">ログイン</button>
        <button id="logoutButton" class="button ghost hidden">ログアウト</button>
      </div>
    </header>

    <main id="app"></main>

    <div id="toast" class="toast hidden" role="status"></div>

    <script src="./ui.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
