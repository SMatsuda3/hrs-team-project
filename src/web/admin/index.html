<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRS Admin</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-portal="admin">
    <header class="topbar portal-topbar">
      <div class="brand">
        <span class="brand-mark">HRS</span>
        <div>
          <strong>Admin Console</strong>
          <small>Hotel Reservation System</small>
        </div>
      </div>
      <nav class="guest-nav hidden" aria-label="管理者メニュー"></nav>
      <div class="topbar-actions">
        <span id="rolePill" class="role-pill hidden"></span>
        <button id="loginButton" class="button secondary hidden">管理者ログイン</button>
        <button id="logoutButton" class="button ghost hidden">ログアウト</button>
      </div>
    </header>

    <main id="app"></main>

    <div id="toast" class="toast hidden" role="status"></div>

    <script src="../ui.js"></script>
    <script src="../app.js"></script>
  </body>
</html>
